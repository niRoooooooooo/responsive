<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Example</title>
    <style>
        .container {
            border: 1px solid #804a4a;
            display: flex;
            gap: 20px;
            /* justify-content: space-around;
            align-items:center; */
            flex-direction: row-reverse;
            flex-wrap: wrap;

        }
        .box {
            border: 2px solid #804a4a;
            width: 150px;
            height: 100px;
        }
    </style>
</head>
<body>
    <h1>Flexbox Layout</h1>
    <div class="container">
        <div class="box">p-1</div>
        <div class="box">p-2</div>
        <div class="box">p-3</div>
        <div class="box">p-4</div>
        <div class="box">p-5</div>
        <div class="box">p-6</div>
        <div class="box">p-7</div>
        <div class="box">p-8</div>
        <div class="box">p-9</div>
    </div>
</body>
</html>
